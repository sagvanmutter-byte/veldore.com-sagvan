  <body>
  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VELDORE — By Sagvan & Ilias</title>
<style>
  :root {
    --bg: #0e0e0e;
    --bg-alt: #161616;
    --text: #efe9df;
    --muted: #8a857c;
    --gold: #c9a964;
    --gold-soft: #e7d4a3;
    --line: #2a2a2a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  h1, h2, h3, .logo { font-family: 'Didot', 'Bodoni MT', Georgia, serif; letter-spacing: 0.08em; }

  /* Layout */
  .layout { display: flex; min-height: 100vh; }

  /* Sidebar */
  aside {
    width: 240px;
    background: var(--bg-alt);
    border-right: 1px solid var(--line);
    padding: 40px 24px;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .logo {
    font-size: 1.6rem;
    color: var(--gold);
    text-align: center;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 24px;
  }
  .logo small {
    display: block;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.3em;
    margin-top: 6px;
  }
  nav ul { list-style: none; }
  nav li {
    padding: 12px 8px;
    cursor: pointer;
    color: var(--text);
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border-bottom: 1px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  nav li:hover, nav li.active { color: var(--gold); border-color: var(--gold); }
  nav li.admin-link { color: var(--gold-soft); margin-top: 30px; font-size: 0.75rem; opacity: 0.7; }

  /* Main */
  main { flex: 1; padding: 60px 80px; }

  /* Hero */
  .hero {
    text-align: center;
    padding: 80px 0 100px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 60px;
  }
  .hero h1 { font-size: 4.5rem; color: var(--gold); margin-bottom: 16px; }
  .hero p { color: var(--muted); letter-spacing: 0.25em; text-transform: uppercase; font-size: 0.85rem; }
  .hero .tag { margin-top: 20px; font-style: italic; color: var(--gold-soft); letter-spacing: 0.1em; }

  /* Product grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 40px; }
  .card {
    background: var(--bg-alt);
    border: 1px solid var(--line);
    overflow: hidden;
    transition: transform 0.3s, border-color 0.3s;
  }
  .card:hover { transform: translateY(-4px); border-color: var(--gold); }
  .card img, .card .placeholder {
    width: 100%; height: 320px; object-fit: cover;
    background: linear-gradient(135deg, #222, #111);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 0.8rem; letter-spacing: 0.2em;
  }
  .card-body { padding: 20px; }
  .card h3 { font-size: 1.1rem; margin-bottom: 8px; color: var(--gold-soft); }
  .card .price { color: var(--gold); font-size: 1rem; letter-spacing: 0.1em; margin-bottom: 12px; }
  .card .desc { color: var(--muted); font-size: 0.85rem; min-height: 40px; }
  .card button {
    margin-top: 16px; width: 100%; padding: 12px;
    background: transparent; border: 1px solid var(--gold);
    color: var(--gold); letter-spacing: 0.2em; font-size: 0.75rem;
    cursor: pointer; text-transform: uppercase; transition: 0.2s;
  }
  .card button:hover { background: var(--gold); color: var(--bg); }

  .empty { text-align: center; color: var(--muted); padding: 60px 20px; font-style: italic; }

  /* Admin */
  .admin-panel { max-width: 700px; margin: 0 auto; }
  .admin-panel h2 { color: var(--gold); margin-bottom: 30px; font-size: 2rem; }
  .login-box, form.product-form {
    background: var(--bg-alt); padding: 30px;
    border: 1px solid var(--line); margin-bottom: 30px;
  }
  label { display: block; margin: 14px 0 6px; color: var(--muted); font-size: 0.8rem; letter-spacing: 0.15em; text-transform: uppercase; }
  input, textarea {
    width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--line);
    color: var(--text); font-family: inherit; font-size: 0.95rem;
  }
  input:focus, textarea:focus { outline: none; border-color: var(--gold); }
  button.primary {
    margin-top: 20px; padding: 14px 30px;
    background: var(--gold); border: none; color: var(--bg);
    letter-spacing: 0.2em; text-transform: uppercase; font-size: 0.8rem; cursor: pointer;
  }
  button.primary:hover { background: var(--gold-soft); }
  button.danger {
    background: transparent; border: 1px solid #a44; color: #c66;
    padding: 6px 12px; font-size: 0.7rem; letter-spacing: 0.1em;
    cursor: pointer; text-transform: uppercase;
  }
  button.danger:hover { background: #a44; color: #fff; }

  .admin-list { margin-top: 20px; }
  .admin-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px; border: 1px solid var(--line); margin-bottom: 10px;
    background: var(--bg-alt);
  }
  .admin-item span { color: var(--gold-soft); }
  .admin-item small { color: var(--muted); display: block; margin-top: 4px; }

  .notice {
    padding: 12px; background: #2a1f0e; border-left: 3px solid var(--gold);
    color: var(--gold-soft); font-size: 0.85rem; margin-bottom: 20px;
  }

  footer {
    margin-top: 100px; padding: 30px; text-align: center;
    border-top: 1px solid var(--line); color: var(--muted); font-size: 0.75rem; letter-spacing: 0.3em;
  }
</style>
</head>
<body>
<div class="layout">
  <aside>
    <div class="logo">VELDORE<small>By Sagvan & Ilias</small></div>
    <nav>
      <ul>
        <li class="active" data-view="shop">Collection</li>
        <li data-view="about">Maison</li>
        <li class="admin-link" data-view="admin">⚜ Admin</li>
      </ul>
    </nav>
  </aside>

  <main id="main"></main>
</div>

<script>
  const ADMIN_PASSWORD = "veldore2026"; // change this to your own
  const STORAGE_KEY = "veldore_products";
  const AUTH_KEY = "veldore_auth";

  let products = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  let isAuthed = sessionStorage.getItem(AUTH_KEY) === "true";

  const main = document.getElementById("main");
  const navItems = document.querySelectorAll("nav li");

  navItems.forEach(li => li.addEventListener("click", () => {
    navItems.forEach(n => n.classList.remove("active"));
    li.classList.add("active");
    render(li.dataset.view);
  }));

  function saveProducts() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
  }

  function render(view) {
    if (view === "shop") renderShop();
    else if (view === "about") renderAbout();
    else if (view === "admin") renderAdmin();
  }

  function renderShop() {
    const grid = products.length
      ? `<div class="grid">${products.map(p => `
          <div class="card">
            ${p.image
              ? `<img src="${p.image}" alt="${escapeHtml(p.name)}" />`
              : `<div class="placeholder">VELDORE</div>`}
            <div class="card-body">
              <h3>${escapeHtml(p.name)}</h3>
              <div class="price">€${Number(p.price).toFixed(2)}</div>
              <div class="desc">${escapeHtml(p.description || "")}</div>
              <button onclick="alert('Checkout coming soon. Contact the maison to acquire this piece.')">Acquire</button>
            </div>
          </div>`).join("")}</div>`
      : `<div class="empty">The collection is being curated. Return shortly.</div>`;

    main.innerHTML = `
      <section class="hero">
        <h1>VELDORE</h1>
        <p>Maison de Couture · Established 2026</p>
        <div class="tag">By Sagvan & Ilias</div>
      </section>
      <h2 style="color:var(--gold); margin-bottom:30px; letter-spacing:0.2em;">THE COLLECTION</h2>
      ${grid}
      <footer>VELDORE © 2026 — CRAFTED WITH INTENTION</footer>
    `;
  }

  function renderAbout() {
    main.innerHTML = `
      <section class="hero">
        <h1>The Maison</h1>
        <div class="tag">By Sagvan & Ilias</div>
      </section>
      <div style="max-width:700px; margin:0 auto; color:var(--text); font-size:1.05rem;">
        <p style="margin-bottom:20px;">VELDORE is a contemporary luxury house founded by <strong style="color:var(--gold)">Sagvan</strong> and <strong style="color:var(--gold)">Ilias</strong>, devoted to garments that move between heritage and modernity.</p>
        <p style="margin-bottom:20px;">Each piece is conceived with intention — fabrics chosen for their soul, silhouettes drawn for those who understand that elegance is a quiet language.</p>
        <p>This is not fashion. This is identity, woven.</p>
      </div>
      <footer>VELDORE © 2026</footer>
    `;
  }

  function renderAdmin() {
    if (!isAuthed) {
      main.innerHTML = `
        <div class="admin-panel">
          <h2>Admin Access</h2>
          <div class="login-box">
            <label>Password</label>
            <input type="password" id="pw" placeholder="Enter password" />
            <button class="primary" onclick="login()">Enter</button>
            <p id="loginErr" style="color:#c66; margin-top:14px; display:none;">Incorrect password.</p>
          </div>
        </div>`;
      return;
    }

    main.innerHTML = `
      <div class="admin-panel">
        <h2>Admin Panel</h2>
        <div class="notice">Logged in as VELDORE administrator. <a style="color:var(--gold); cursor:pointer;" onclick="logout()">Sign out</a></div>

        <form class="product-form" onsubmit="addProduct(event)">
          <h3 style="color:var(--gold-soft); margin-bottom:10px;">Add New Piece</h3>
          <label>Name</label>
          <input id="name" required placeholder="e.g. Onyx Wool Coat" />
          <label>Price (€)</label>
          <input id="price" type="number" step="0.01" required placeholder="1200" />
          <label>Description</label>
          <textarea id="description" rows="3" placeholder="A short, evocative description"></textarea>
          <label>Image URL (optional)</label>
          <input id="image" placeholder="https://..." />
          <button class="primary" type="submit">Publish to Collection</button>
        </form>

        <h3 style="color:var(--gold-soft); margin:30px 0 14px;">Current Collection (${products.length})</h3>
        <div class="admin-list">
          ${products.length === 0
            ? '<div class="empty">No pieces yet.</div>'
            : products.map((p, i) => `
              <div class="admin-item">
                <div>
                  <span>${escapeHtml(p.name)}</span>
                  <small>€${Number(p.price).toFixed(2)} — ${escapeHtml(p.description || "")}</small>
                </div>
                <button class="danger" onclick="deleteProduct(${i})">Remove</button>
              </div>`).join("")}
        </div>
      </div>
      <footer>VELDORE © 2026</footer>
    `;
  }

  window.login = function() {
    const pw = document.getElementById("pw").value;
    if (pw === ADMIN_PASSWORD) {
      isAuthed = true;
      sessionStorage.setItem(AUTH_KEY, "true");
      renderAdmin();
    } else {
      document.getElementById("loginErr").style.display = "block";
    }
  };

  window.logout = function() {
    isAuthed = false;
    sessionStorage.removeItem(AUTH_KEY);
    renderAdmin();
  };

  window.addProduct = function(e) {
    e.preventDefault();
    products.push({
      name: document.getElementById("name").value,
      price: document.getElementById("price").value,
      description: document.getElementById("description").value,
      image: document.getElementById("image").value
    });
    saveProducts();
    renderAdmin();
  };

  window.deleteProduct = function(i) {
    if (confirm("Remove this piece from the collection?")) {
      products.splice(i, 1);
      saveProducts();
      renderAdmin();
    }
  };

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  render("shop");
</script>
</body>
</html>

  </body>
  
</html>
